<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>중2 도형의 닮음 일본 만화풍 학습만화</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      background: #111;
      color: #eee;
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      line-height: 1.6;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 5;
      background: rgba(17,17,17,.92);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid #333;
      padding: 14px 18px;
      text-align: center;
    }
    h1 { margin: 0; font-size: clamp(18px, 4vw, 30px); }
    p { margin: 6px 0 0; color: #bbb; }
    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 18px;
    }
    figure {
      margin: 0 0 34px;
      padding: 12px;
      background: #1b1b1b;
      border: 1px solid #333;
      border-radius: 14px;
      box-shadow: 0 12px 36px rgba(0,0,0,.35);
    }
    figcaption {
      font-weight: 700;
      padding: 4px 4px 12px;
      color: #fff;
    }
    img {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 8px;
      background: #fff;
    }
    .note {
      margin: 10px auto 22px;
      max-width: 760px;
      color: #ccc;
      text-align: center;
    }
    a { color: #9ad; }
  </style>
</head>
<body>
  <header>
    <h1>중2 수학 2-2 · 도형의 닮음 학습만화</h1>
    <p>일본 만화풍 이미지 생성본 모아보기</p>
  </header>
  <main>
    <p class="note">아래로 스크롤해서 1화부터 4화까지 이어서 보세요. 맨 아래에는 처음 생성된 추가 시안도 보존해 두었습니다.</p>

    <figure>
      <figcaption>1화: 도형의 닮음 완전정복</figcaption>
      <img src="manga-pages/01-page1.png" alt="1화 도형의 닮음 완전정복" />
    </figure>

    <figure>
      <figcaption>2화: 삼각형 닮음 조건 3총사</figcaption>
      <img src="manga-pages/02-page2.png" alt="2화 삼각형 닮음 조건" />
    </figure>

    <figure>
      <figcaption>3화: 평행선과 선분의 길이의 비</figcaption>
      <img src="manga-pages/03-page3.png" alt="3화 평행선과 선분의 길이의 비" />
    </figure>

    <figure>
      <figcaption>4화: 닮음의 활용</figcaption>
      <img src="manga-pages/04-page4.png" alt="4화 닮음의 활용" />
    </figure>

    <figure>
      <figcaption>추가 보존본: 첫 생성 시안</figcaption>
      <img src="manga-pages/00-extra-first-draft.png" alt="추가 보존본 첫 생성 시안" />
    </figure>
  </main>
</body>
</html>
